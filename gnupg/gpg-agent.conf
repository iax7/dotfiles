# vi: ft=conf
# Reload: gpg-connect-agent reloadagent /bye

# === PASSPHRASE CACHING =======================================================
default-cache-ttl 604800   # 1 week (default: 600s  = 10 minutes)
max-cache-ttl     604800   # 1 week (default: 7200s = 2 hours)

# === PINENTRY =================================================================
# Requires a pinentry-auto symlink pointing to the correct binary:
#   macOS:  ln -sf /opt/homebrew/bin/pinentry-mac /usr/local/bin/pinentry-auto
#   Linux:  ln -sf /usr/bin/pinentry-gnome3       /usr/local/bin/pinentry-auto
pinentry-program /usr/local/bin/pinentry-auto

# === PRESETS ==================================================================
# Allows gpg-preset-passphrase for automation (e.g. unlock on login)
allow-preset-passphrase
